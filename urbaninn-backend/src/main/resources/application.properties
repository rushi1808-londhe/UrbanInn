spring.application.name=UrbanInn
server.port=8080

# Use env variable on Render, fallback to local for dev
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/urban_inn}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:yourpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.time-zone=UTC

app.jwt.secret=${JWT_SECRET:5A7134743777217A24432646294A404E635266546A576E5A7234753778214125}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
app.jwt.guest-expiration-ms=${JWT_GUEST_EXPIRATION:43200000}

logging.level.com.rushikesh=DEBUG
logging.level.org.springframework.security=INFO